<svg width="400" height="400" viewBox="0 0 400 400" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Streak — N logo</title>
  <desc>Round N logo with a diagonal gold streak on a blue gradient background</desc>
 
  <defs>
    <linearGradient id="rg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1957A5"/>
      <stop offset="100%" stop-color="#15375A"/>
    </linearGradient>
    <clipPath id="clipC1"><circle cx="200" cy="200" r="184"/></clipPath>
  </defs>
 
  <circle cx="200" cy="200" r="184" fill="url(#rg1)"/>
  <g clip-path="url(#clipC1)">
    <polygon points="16,384 140,16 220,16 96,384" fill="#FAB95B" opacity="0.9"/>
    <polygon points="220,384 300,160 360,160 280,384" fill="#FAB95B" opacity="0.4"/>
  </g>
  <text x="200" y="200" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="192" font-weight="900" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central" letter-spacing="-8">N</text>
</svg>